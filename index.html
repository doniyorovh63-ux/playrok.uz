<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GV Market | Professional Gaming Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* HTML ichida kichik qo'shimcha dizayn (CSS faylingizga qo'shimcha) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        header {
            background: rgba(15, 17, 17, 0.95);
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid #ff4500;
        }
        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #ff4500;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .hero {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(to bottom, #1a1d1d, #0f1111);
        }
        .hero h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ff4500, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero p {
            color: #ccc;
            font-size: 1.1rem;
        }
        footer {
            text-align: center;
            padding: 40px;
            color: #555;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">GV MARKETPLACE</div>
    </header>

    <section class="hero">
        <h1>O'yin Dunyosiga Xush Kelibsiz</h1>
        <p>Eng arzon va ishonchli xizmatlar faqat bizda!</p>
    </section>

    <div class="container">
        </div>

    <footer>
        &copy; 2026 GV Marketplace. Barcha huquqlar himoyalangan.
    </footer>

    <script src="script.js"></script>
</body>
</html>
